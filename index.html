<!DOCTYPE html>
<html lang="ko">

            theme: {
                extend: {
                    colors: {

    <style>

            0% { transform: rotate(0deg); }

            0% { transform: rotate(360deg); }

        }
        @keyframes pulse-light {

            animation: cyber-spin-slow 25s linear infinite;

        }

            animation: cyber-spin-reverse 15s linear infinite;

            animation: cyber-spin-slow 4s linear infinite;

            animation: float-gentle 6s ease-in-out infinite;

        .area-type-badge { display:inline-flex; align-items:center; gap:5px; border:1px solid rgba(100,116,139,.45); padding:3px 7px; border-radius:999px; font-size:9px; letter-spacing:.12em; }

<body class="min-h-screen p-4 md:p-8 flex items-center justify-center">

    <!-- React Root Mount Node -->
    <div id="root" class="w-full max-w-6xl"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const TypewriterEffect = ({ text }) => {
            const [displayed, setDisplayed] = useState('');
            useEffect(() => {
                let i = 0;
                setDisplayed('');
                const timer = setInterval(() => {
                    setDisplayed(text.substring(0, i + 1));
                    i++;
                    if (i >= text.length) {
                        clearInterval(timer);
                    }
                }, 60);
                return () => clearInterval(timer);
            }, [text]);
            return <span className="whitespace-pre-line font-mono text-cyber-neon text-sm leading-relaxed drop-shadow-[0_0_5px_rgba(0,240,255,0.8)]">{displayed}</span>;
        };

        const INITIAL_QUESTS = [
            { id:'tutorial_leave', type:'TUTORIAL QUEST', color:'text-cyan-300', border:'border-cyan-300/40', bg:'bg-cyan-300/10', title:'Leave Home', subtitle:'집을 나서 첫 모험을 시작하기', stars:5, reward:'🧥 Student Engineer Jacket', status:'locked', progress:0, xp:100, unlock:'student_jacket' },
            { id:'q1', type:'MAIN QUEST', color:'text-yellow-400', border:'border-yellow-400/40', bg:'bg-yellow-400/10', title:'Get a Job That I Truly Love', subtitle:'내가 만족할 수 있는 회사에 취업하기', stars:5, reward:'🏅 Professional Developer + Master Suit', status:'active', progress:65, xp:180, unlock:'master_suit' },

                                    <span className="block text-cyber-dim">WEAPON LINK</span>
                                    <span className="text-cyber-neon">CONNECTED</span>
                                </div>
                                <div className="rounded border border-cyber-purple/20 bg-cyber-purple/5 px-2 py-1.5">
                                    <span className="block text-cyber-dim">SUIT MATRIX</span>
                                    <span className="text-cyber-purple">{currentArmorObj.defense}% STABLE</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const SAVE_KEY = 'architectLabSaveV5';
            const cloneInitialQuests = () => INITIAL_QUESTS.map(quest => ({ ...quest }));
            const readSavedGame = () => {
                try { return JSON.parse(localStorage.getItem(SAVE_KEY) || 'null'); }
                catch { return null; }
            };

            // 발표 때는 언제나 처음부터 시작하도록 PRESENTATION MODE가 기본값입니다.
            const [gameMode, setGameMode] = useState('presentation');
            const [activeTab, setActiveTab] = useState('dashboard');
            const [systemStatusView, setSystemStatusView] = useState('profile');
            const [quests, setQuests] = useState(cloneInitialQuests);
            const [hiddenRevealed, setHiddenRevealed] = useState(false);
            const [level, setLevel] = useState(1);
            const [exp, setExp] = useState(0);
            const [expToNext, setExpToNext] = useState(100);
            const [showOpening, setShowOpening] = useState(true);
            const [tutorialStage, setTutorialStage] = useState(null);
            const [toast, setToast] = useState(null);
            const [levelUpFx, setLevelUpFx] = useState(false);
            const [achievements, setAchievements] = useState([]);
            const [unlockedItems, setUnlockedItems] = useState(['neural_deck']);
            const [visitedTabs, setVisitedTabs] = useState([]);
            const [footprints, setFootprints] = useState([]);
            const [companionUnlocked, setCompanionUnlocked] = useState(false);
            const [gongsilDialogue, setGongsilDialogue] = useState(false);
            const [selectedRegion, setSelectedRegion] = useState('home');
            const [questFlyout, setQuestFlyout] = useState(null);
            const [questEvidence, setQuestEvidence] = useState({});
            const [activeEvidenceQuestId, setActiveEvidenceQuestId] = useState(null);
            const [memoryEvidence, setMemoryEvidence] = useState({});
            const [activeMemoryRegionId, setActiveMemoryRegionId] = useState(null);
            const [imageModal, setImageModal] = useState(null);
            
            const [logs, setLogs] = useState([
                "[10:31:31] ARCHITECT_LAB 온라인 상태 감지.",
                "[10:31:31] 사이버네틱 아키텍트 시스템 부트 완료."
            ]);
            const [craftError, setCraftError] = useState('');
            const [commandInput, setCommandInput] = useState('');
            const [dramaFilter, setDramaFilter] = useState('all');

            // Gear state management
            const [equippedWeapon, setEquippedWeapon] = useState('neural_deck');
            const [equippedArmor, setEquippedArmor] = useState('insulated_suit');
            const [knittingUnlocked, setKnittingUnlocked] = useState(false);

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [activeTab, equippedWeapon, equippedArmor, knittingUnlocked]);

            const getRank = (lv) => {
                if (lv >= 26) return 'Architect Master';
                if (lv >= 21) return 'Automation Specialist';
                if (lv >= 16) return 'Cybernetic Architect';
                if (lv >= 11) return 'Junior Architect';
                if (lv >= 6) return 'Developer Candidate';
                return 'System Trainee';
            };

            useEffect(() => {
                if (gameMode !== 'save') return;
                localStorage.setItem(SAVE_KEY, JSON.stringify({
                    quests, level, exp, expToNext, achievements, unlockedItems,
                    visitedTabs, footprints, companionUnlocked, showOpening,
                    tutorialStage, activeTab, systemStatusView, equippedWeapon,
                    equippedArmor, knittingUnlocked, questEvidence, memoryEvidence
                }));
            }, [gameMode, quests, level, exp, expToNext, achievements, unlockedItems, visitedTabs, footprints, companionUnlocked, showOpening, tutorialStage, activeTab, systemStatusView, equippedWeapon, equippedArmor, knittingUnlocked, questEvidence, memoryEvidence]);

            const applyGameState = (saved) => {
                if (!saved) return;
                setQuests(saved.quests || cloneInitialQuests());
                setLevel(saved.level || 1);
                setExp(saved.exp || 0);
                setExpToNext(saved.expToNext || 100);
                setAchievements(saved.achievements || []);
                setUnlockedItems(saved.unlockedItems || ['neural_deck']);
                setVisitedTabs(saved.visitedTabs || []);
                setFootprints(saved.footprints || []);
                setCompanionUnlocked(Boolean(saved.companionUnlocked));
                setShowOpening(saved.showOpening ?? true);
                setTutorialStage(saved.tutorialStage ?? null);
                setActiveTab(saved.activeTab || 'dashboard');
                setSystemStatusView(saved.systemStatusView || 'profile');
                setEquippedWeapon(saved.equippedWeapon || 'neural_deck');
                setEquippedArmor(saved.equippedArmor || 'insulated_suit');
                setKnittingUnlocked(Boolean(saved.knittingUnlocked));
                setQuestEvidence(saved.questEvidence || {});
                setMemoryEvidence(saved.memoryEvidence || {});
            };

            const resetRuntime = ({ clearSave = false } = {}) => {
                if (clearSave) localStorage.removeItem(SAVE_KEY);
                setActiveTab('dashboard');
                setSystemStatusView('profile');
                setQuests(cloneInitialQuests());
                setHiddenRevealed(false);
                setLevel(1);
                setExp(0);
                setExpToNext(100);
                setShowOpening(true);
                setTutorialStage(null);
                setToast(null);
                setLevelUpFx(false);
                setAchievements([]);
                setUnlockedItems(['neural_deck']);
                setVisitedTabs([]);
                setFootprints([]);
                setCompanionUnlocked(false);
                setGongsilDialogue(false);
                setSelectedRegion('home');
                setQuestEvidence({});
                setMemoryEvidence({});
                setImageModal(null);
                setQuestFlyout(null);
                setQuestEvidence({});
                setActiveEvidenceQuestId(null);
                setMemoryEvidence({});
                setActiveMemoryRegionId(null);
                setLogs([
                    '[SYSTEM] PRESENTATION DATA INITIALIZED.',
                    '[SYSTEM] ARCHITECT_LAB 부트 준비 완료.'
                ]);
                setCraftError('');
                setCommandInput('');
                setDramaFilter('all');
                setEquippedWeapon('neural_deck');
                setEquippedArmor('insulated_suit');
                setKnittingUnlocked(false);
            };

            const enablePresentationMode = () => {
                setGameMode('presentation');
                resetRuntime({ clearSave: false });
                setTimeout(() => showGameToast('PRESENTATION MODE', '새로고침할 때마다 처음부터 시작합니다.'), 50);
            };

            const enableSaveMode = () => {
                const saved = readSavedGame();
                setGameMode('save');
                if (saved) {
                    applyGameState(saved);
                    setTimeout(() => showGameToast('SAVE MODE', '저장된 진행 상태를 불러왔습니다.'), 50);
                } else {
                    setTimeout(() => showGameToast('SAVE MODE', '현재 진행 상태를 저장하기 시작합니다.'), 50);
                }
            };

            const startNewGame = () => {
                const approved = window.confirm('저장된 진행 상태를 삭제하고 처음부터 시작할까요?');
                if (!approved) return;
                resetRuntime({ clearSave: true });
                showGameToast('NEW GAME', '모든 진행 상태를 초기화했습니다.');
            };

            const showGameToast = (title, detail) => {
                setToast({ title, detail, key: Date.now() });
                setTimeout(() => setToast(null), 3200);
            };

            const unlockAchievement = (id, title) => {
                if (achievements.includes(id)) return;
                setAchievements(prev => [...prev, id]);
                showGameToast('HIDDEN ACHIEVEMENT UNLOCKED', title);
                addLogMessage(`[ACHIEVEMENT] 숨겨진 업적 '${title}' 해금!`, setLogs);
            };

            const grantQuestExp = (amount) => {
                let nextLevel = level;
                let nextExp = exp + amount;
                let nextNeed = expToNext;
                let leveled = false;
                while (nextExp >= nextNeed && nextLevel < 30) {
                    nextExp -= nextNeed;
                    nextLevel += 1;
                    nextNeed = Math.round(nextNeed * 1.2);
                    leveled = true;
                }
                if (nextLevel >= 30) nextExp = Math.min(nextExp, nextNeed);
                setExp(nextExp);
                setLevel(nextLevel);
                setExpToNext(nextNeed);
                if (leveled) {
                    setLevelUpFx(true);
                    setTimeout(() => setLevelUpFx(false), 1250);
                    showGameToast('LEVEL UP!', `Lv.${nextLevel} // ${getRank(nextLevel)}`);
                    addLogMessage(`[LEVEL UP] Lv.${nextLevel} 달성. Rank: ${getRank(nextLevel)}`, setLogs);
                } else {
                    showGameToast('QUEST COMPLETE!', `+${amount} EXP`);
                }
            };

            const unlockItem = (itemId) => {
                if (!itemId || unlockedItems.includes(itemId)) return;
                setUnlockedItems(prev => [...prev, itemId]);
                const item = EQUIPMENT_REWARDS[itemId];
                if (item) {
                    showGameToast('EQUIPMENT UNLOCKED', `${item.slot} // ${item.name}`);
                    addLogMessage(`[EQUIPMENT] ${item.name} 해금.`, setLogs);
                }
            };

            const completeQuest = (questId, silent=false) => {
                const target = quests.find(q => q.id === questId);
                if (!target || target.status === 'completed' || target.status === 'locked') return false;
                setQuests(prev => prev.map(q => q.id === questId ? {...q,status:'completed',progress:100}:q));
                if (!silent) setQuestFlyout({title:target.title,xp:target.xp||10,key:Date.now()});
                grantQuestExp(target.xp || 10);
                unlockItem(target.unlock);
                if (!achievements.includes('first_step')) unlockAchievement('first_step','First Step');
                addLogMessage(`[QUEST] '${target.title}' 완료. +${target.xp||10} EXP`, setLogs);
                return true;
            };

            const visitTab = (tab) => {
                setActiveTab(tab);
                if (!visitedTabs.includes(tab)) setVisitedTabs(prev => [...prev,tab]);
                const auto = quests.find(q => q.autoTab === tab && q.status === 'active');
                if (auto) setTimeout(() => completeQuest(auto.id), 250);
            };

            useEffect(() => {
                const explorerDone = quests.filter(q => q.type === 'EXPLORER QUEST' && q.status === 'completed').length;
                if (explorerDone >= 5) {
                    setQuests(prev => prev.map(q => q.id === 'hidden_gongsil' && q.status === 'locked' ? {...q,status:'active',subtitle:'월드맵 어딘가에서 반짝이는 발자국 3개를 찾아라'} : q));
                    unlockAchievement('curious_explorer','Curious Explorer');
                }
            }, [quests.filter(q=>q.type==='EXPLORER QUEST'&&q.status==='completed').length]);

            const findFootprint = (id) => {
                if (footprints.includes(id)) return;
                const next=[...footprints,id];
                setFootprints(next);
                setQuests(prev => prev.map(q => q.id==='hidden_gongsil'?{...q,progress:Math.round(next.length/3*100)}:q));
                showGameToast('FOOTPRINT FOUND', `${next.length} / 3`);
                addLogMessage(`[UNKNOWN SIGNAL] 반짝이는 발자국 ${next.length}/3 발견.`,setLogs);
                if (next.length===3) {
                    unlockAchievement('footprint_hunter','Footprint Hunter');
                    setTimeout(()=>setGongsilDialogue(true),900);
                }
            };

            const unlockGongsil = () => {
                setGongsilDialogue(false);
                setCompanionUnlocked(true);
                setQuests(prev=>prev.map(q=>q.id==='hidden_gongsil'?{...q,status:'completed',progress:100}:q));
                unlockItem('gongsil');
                grantQuestExp(120);
                unlockAchievement('always_with_me','Always With Me');
                showGameToast('COMPANION UNLOCKED','공실이 // Always With Me');
            };

            const finishTutorial = () => {
                setTutorialStage(null);
                setQuests(prev=>prev.map(q=>q.id==='tutorial_leave'?{...q,status:'completed',progress:100}:q));
                grantQuestExp(100);
                unlockItem('student_jacket');
                setQuestFlyout({title:'Leave Home',xp:100,key:Date.now()});
                addLogMessage('[TUTORIAL] Home Village를 떠났습니다. WORLD MAP 해금.',setLogs);
                setActiveTab('world');
            };

            const handleCommandSubmit = (e) => {
                e.preventDefault();
                if (!commandInput.trim()) return;
                
                const cmd = commandInput.toLowerCase().trim();
                let reply = `Unknown command: '${cmd}'. 'help'를 입력해보세요.`;
                
                if (cmd === 'help') {
                    reply = "사용 가능 명령어: help, status, level, map, companion, skills, gear, clear";
                    const helpQuest = quests.find(q=>q.id==='e_help'&&q.status==='active');
                    if (helpQuest) setTimeout(()=>completeQuest('e_help'),250);
                    unlockAchievement('system_hacker','System Hacker');
                } else if (cmd === 'status') {
                    reply = `STATUS: ONLINE. 무기: ${WEAPONS_DB.find(w => w.id === equippedWeapon)?.name}, 의상: ${ARMORS_DB.find(a => a.id === equippedArmor)?.name}`;
                } else if (cmd === 'level') {
                    reply = `PLAYER: SSAFY_CLASS1_대장 // Lv.${level} // ${exp}/${expToNext} EXP // ${getRank(level)}`;
                } else if (cmd === 'map') {
                    reply = 'WORLD MAP 좌표 동기화 완료.'; visitTab('world');
                } else if (cmd === 'companion') {
                    reply = companionUnlocked ? 'COMPANION: 공실이 // FOLLOWING' : 'COMPANION SIGNAL: LOCKED';
                } else if (cmd === 'ping') {
                    reply = "PONG! 신호 정상. 지연 시간: 7ms.";
                } else if (cmd === 'skills') {
                    reply = "ACTIVE: 전기기사, PLC, CATIA/NX, 아두이노, 파이썬.";
                } else if (cmd === 'gear') {
                    reply = "GEAR_MATRIX 활성화. 캐릭터 탭에서 무기 및 복장을 전환할 수 있습니다.";
                } else if (cmd === 'clear') {
                    setLogs([]);
                    setCommandInput('');
                    return;
                }

                addLogMessage(`> ${commandInput}`, setLogs);
                setTimeout(() => {
                    addLogMessage(`[System] ${reply}`, setLogs);
                }, 300);
                setCommandInput('');
            };

            const triggerCrafting = () => {
                addLogMessage("뜨개질 프로젝트 빌드 시도 중...", setLogs);
                setCraftError("ERROR: 원자재(뜨개실 및 바늘 모듈) 수급 불가. 하드웨어 조달 필요!");
                addLogMessage("[ERR] 재료 구매 대기중 - 시작 전 전원 차단 상태.", setLogs);
                
                setTimeout(() => {
                    // Replaced native confirm dialog with interactive mock logic
                    const confirmed = true; // Bypassing confirm alert based on system constraints
                    setKnittingUnlocked(true);
                    setCraftError("");
                    addLogMessage("[SUCCESS] 암시장 통신 성공! [나노-섬유 뜨개질 스카프] 설계 레시피 해금 완료!", setLogs);
                }, 800);
            };

            const selectWeapon = (weapon) => {
                if (!(weapon.unlocked || unlockedItems.includes(weapon.id))) {
                    addLogMessage(`[SECURITY] 무장 장착 차단: '${weapon.name}'은(는) 잠겨 있습니다. 획득 조건: ${weapon.condition}`, setLogs);
                    return;
                }
                setEquippedWeapon(weapon.id);
                addLogMessage(`[SYSTEM] 메인 무기 전환: ${weapon.name} 장착 완료.`, setLogs);
            };

            const selectArmor = (armor) => {
                const isActuallyUnlocked = armor.id === 'knitted_scarf' ? (armor.unlocked || knittingUnlocked || unlockedItems.includes('knitted_scarf')) : (armor.unlocked || unlockedItems.includes(armor.id));
                
                if (!isActuallyUnlocked) {
                    addLogMessage(`[SECURITY] 복장 동기화 거부: '${armor.name}'은(는) 잠겨 있습니다. 획득 조건: ${armor.condition}`, setLogs);
                    return;
                }
                setEquippedArmor(armor.id);
                addLogMessage(`[SYSTEM] 아머 슈트 동기화: ${armor.name} 착용 완료.`, setLogs);
            };

            const currentWeaponObj = WEAPONS_DB.find(w => w.id === equippedWeapon) || WEAPONS_DB[0];
            const currentArmorObj = ARMORS_DB.find(a => a.id === equippedArmor) || ARMORS_DB[0];

            const readImageFile = (file, onReady) => {
                if (!file) return;
                if (!file.type?.startsWith('image/')) {
                    showGameToast('IMAGE ERROR','이미지만 사용할 수 있습니다.');
                    return;
                }
                const reader = new FileReader();
                reader.onload = () => onReady({ name:file.name || `pasted-image-${Date.now()}.png`, preview:reader.result });
                reader.readAsDataURL(file);
            };

            const handleEvidenceUpload = (questId, file, source='FILE') => {
                readImageFile(file, (image) => {
                    setQuestEvidence(prev => ({...prev,[questId]:[...(prev[questId] || []),image]}));
                    setActiveEvidenceQuestId(questId);
                    addLogMessage(`[EVIDENCE:${source}] '${image.name}' 이미지 미리보기 등록.`,setLogs);
                    showGameToast('EVIDENCE READY','미리보기를 확인한 뒤 완료를 확정하세요.');
                });
            };

            const getClipboardImage = (clipboardData) => {
                const items = Array.from(clipboardData?.items || []);
                const imageItem = items.find(item => item.type?.startsWith('image/'));
                return imageItem?.getAsFile?.() || null;
            };

            useEffect(() => {
                const handleGlobalPaste = (event) => {
                    const file = getClipboardImage(event.clipboardData);
                    if (!file) return;
                    if (activeEvidenceQuestId) {
                        event.preventDefault();
                        handleEvidenceUpload(activeEvidenceQuestId,file,'PASTE');
                        return;
                    }
                    if (activeMemoryRegionId) {
                        event.preventDefault();
                        handleMemoryImage(activeMemoryRegionId,file,'PASTE');
                    }
                };
                window.addEventListener('paste',handleGlobalPaste);
                return () => window.removeEventListener('paste',handleGlobalPaste);
            }, [activeEvidenceQuestId, activeMemoryRegionId]);

            const handleEvidenceDrop = (event, questId) => {
                event.preventDefault();
                event.stopPropagation();
                const file = Array.from(event.dataTransfer?.files || []).find(f=>f.type.startsWith('image/'));
                if (file) handleEvidenceUpload(questId,file,'DROP');
                else showGameToast('DROP ERROR','이미지 파일을 드롭해주세요.');
            };

            const handleMemoryImage = (regionId, file, source='FILE') => {
                readImageFile(file, (image) => {
                    setMemoryEvidence(prev => ({...prev,[regionId]:[...(prev[regionId] || []),image]}));
                    setActiveMemoryRegionId(regionId);
                    addLogMessage(`[MEMORY:${source}] ${MAP_REGIONS.find(r=>r.id===regionId)?.name || regionId} 추억 이미지 등록.`,setLogs);
                    showGameToast('MEMORY SHARD SAVED','월드맵의 추억 지역에 이미지가 연결되었습니다.');
                });
            };

            const handleMemoryDrop = (event, regionId) => {
                event.preventDefault();
                event.stopPropagation();
                const file = Array.from(event.dataTransfer?.files || []).find(f=>f.type.startsWith('image/'));
                if (file) handleMemoryImage(regionId,file,'DROP');
                else showGameToast('DROP ERROR','이미지 파일을 드롭해주세요.');
            };

            const confirmQuestWithEvidence = (questId) => {
                const evidenceList=questEvidence[questId] || [];
                if (!evidenceList.length) {
                    showGameToast('EVIDENCE REQUIRED','관련 사진을 먼저 업로드하세요.');
                    return;
                }
                const linkedRegions = MAP_REGIONS.filter(region => (region.questIds || []).includes(questId));
                if (linkedRegions.length) {
                    setMemoryEvidence(prev => {
                        const next={...prev};
                        linkedRegions.forEach(region => {
                            const existing=next[region.id] || [];
                            const seen=new Set(existing.map(item=>item.preview));
                            next[region.id]=[...existing,...evidenceList.filter(item=>!seen.has(item.preview))];
                        });
                        return next;
                    });
                }
                const completed=completeQuest(questId);
                if (completed) {
                    addLogMessage(`[EVIDENCE VERIFIED] 사진 확인 후 퀘스트 완료 승인.`,setLogs);
                    showGameToast('PROOF ARCHIVED', linkedRegions.length ? '사진이 퀘스트와 월드맵에 기록되었습니다.' : '사진이 퀘스트 기록에 보관되었습니다.');
                }
            };

            const removeQuestEvidence = (questId, index=null) => {
                setQuestEvidence(prev => {
                    const next={...prev};
                    if (index===null) delete next[questId];
                    else {
                        const list=[...(next[questId] || [])];
                        list.splice(index,1);
                        if (list.length) next[questId]=list; else delete next[questId];
                    }
                    return next;
                });
            };

            const handleQuestClick = (questId) => {
                const target=quests.find(q=>q.id===questId);
                if (!target) return;
                if (target.id==='hidden_gongsil') {
                    if (target.status==='locked') showGameToast('HIDDEN QUEST LOCKED','Explorer Quest 5개를 먼저 완료하세요.');
                    else showGameToast('UNKNOWN SIGNAL',`${footprints.length} / 3 footprints found`);
                    return;
                }
                if (target.autoTab) { visitTab(target.autoTab); return; }
                if (target.status === 'active') showGameToast('PHOTO EVIDENCE','퀘스트 카드에서 관련 사진을 업로드하세요.');
            };

            return (
                <div className="bg-cyber-panel border-2 border-cyber-border rounded-xl p-4 md:p-6 overflow-hidden flex flex-col gap-6 relative shadow-2xl">
                    {showOpening && (
                        <div className="opening-backdrop">
                            <div className="opening-panel relative rounded-xl p-6 md:p-9">
                                <div className="hud-corner tl"></div><div className="hud-corner tr"></div>
                                <div className="hud-corner bl"></div><div className="hud-corner br"></div>
                                <div className="text-[10px] tracking-[0.35em] text-cyber-neon">SYSTEM MESSAGE // MEMORY ARCHIVE</div>
                                <div className="mt-3 text-2xl font-bold text-white cyber-glow">System Online.</div>
                                <div className="mt-5 space-y-3 text-sm leading-relaxed text-slate-300">
                                    <p className="text-cyber-dim">당신은 <strong className="text-cyber-neon">SSAFY_CLASS1_대장</strong>의 시스템에 접속했습니다.</p>
                                    <p>안녕하세요. <strong className="text-cyber-neon">SSAFY_CLASS1_대장</strong>입니다.</p>
                                    <p>이곳에는</p>
                                    <p>아직 끝나지 않은 꿈과<br/>앞으로 이루고 싶은 목표,<br/>그리고 잊지 못할 추억들이 저장되어 있습니다.</p>

                            {/* Skill Unlock Protocol */}
                            {activeTab === 'skills' && (
                                <section className="mt-6 space-y-3"><h3 className="border-b border-cyber-border pb-2 text-sm font-bold text-cyber-purple">AUTO-UNLOCK PROTOCOL</h3><div className="grid grid-cols-1 md:grid-cols-2 gap-3">{SKILL_PROTOCOLS.map(skill=>{const open=skill.unlock?level>=skill.unlock:achievements.includes(skill.achievement);return <div key={skill.name} className={`rounded border p-3 ${open?'border-cyber-purple/50 bg-cyber-purple/5':'border-cyber-border bg-cyber-dark opacity-50'}`}><div className="flex justify-between"><span className={open?'text-cyber-purple font-bold':'text-cyber-dim'}>{open?skill.name:'LOCKED SKILL'}</span><span className="text-[10px]">{open?'ACTIVE':skill.unlock?`Lv.${skill.unlock}`:'SECRET'}</span></div><p className="mt-2 text-[11px] text-cyber-dim">{open?skill.desc:'Required protocol has not been satisfied.'}</p></div>})}</div></section>
                            )}
                        </main>
                    </div>

                    {imageModal && <div className="image-modal-backdrop" onClick={()=>setImageModal(null)}><div className="image-modal-card rounded-lg overflow-hidden" onClick={(e)=>e.stopPropagation()}><div className="flex items-center justify-between border-b border-cyber-border px-4 py-3"><span className="text-xs font-bold text-cyber-neon">{imageModal.title}</span><button onClick={()=>setImageModal(null)} className="rounded border border-cyber-border px-2 py-1 text-xs text-cyber-dim hover:text-white">CLOSE</button></div><img src={imageModal.src} alt={imageModal.title}/></div></div>}

                    {/* Footer bar */}
                    <footer className="mt-4 border-t border-cyber-border pt-4 text-center text-xs text-cyber-dim flex flex-col md:flex-row justify-between items-center gap-2">
                        <span>© 2026 ARCHITECT_LAB. ALL SYSTEM SECURED.</span>
                        <span className="text-[10px]">DESIGNED FOR THE ULTIMATE CYBERNETIC AUTOMATION ENVIRONMENT</span>
                    </footer>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
